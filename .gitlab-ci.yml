stages:
  - build
  - test
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# Build and push Docker image
build_and_push:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - "docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY"
    - "docker build -t $IMAGE_TAG -t $IMAGE_LATEST ."
    - "docker push $IMAGE_TAG"
    - "docker push $IMAGE_LATEST"
    - "echo Image pushed: $IMAGE_TAG"

# Test Docker Compose setup
test_docker_compose:
  stage: test
  image: docker/compose:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - docker-compose build
    - docker-compose up -d
    - sleep 10
    - docker-compose ps
    - echo "✅ Docker Compose startup successful"
    - docker-compose down -v

# Code linting
lint:
  stage: test
  image: python:3.11
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - pip install flake8 pylint
    - flake8 main.py --max-line-length=120 --exit-zero
    - echo "✅ Linting completed"
  allow_failure: true

# Manual deployment trigger
deploy_production:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - if: '$CI_COMMIT_TAG'
      when: manual
  script:
    - echo "🚀 Production deployment trigger"
    - echo "Image available at: $IMAGE_TAG"
    - echo "Pull command: docker pull $IMAGE_TAG"
    - echo "Latest: docker pull $IMAGE_LATEST"
  environment:
    name: "production"
